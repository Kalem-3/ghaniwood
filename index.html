<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GhaniWood – Carpentry & Furniture Assembly</title>
  <meta name="description" content="Professional carpentry and furniture assembly in Germany. Custom woodwork, IKEA assembly, kitchen installation." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ░░ NAVBAR ░░ -->
  <header id="navbar">
    <div class="nav-inner">
      <a href="#home" class="logo">
        <span class="logo-icon">🪵</span>
        <span class="logo-text">GhaniWood</span>
      </a>

      <nav class="nav-links" id="navLinks">
        <a href="#home"     data-i18n="nav_home"></a>
        <a href="#about"    data-i18n="nav_about"></a>
        <a href="#services" data-i18n="nav_services"></a>
        <a href="#gallery"  data-i18n="nav_gallery"></a>
        <a href="#contact"  data-i18n="nav_contact"></a>
      </nav>

      <div class="nav-right">
        <div class="lang-switcher">
          <button class="lang-btn active" data-lang="en">EN</button>
          <button class="lang-btn"        data-lang="de">DE</button>
          <button class="lang-btn"        data-lang="tr">TR</button>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- ░░ HERO ░░ -->
  <section id="home" class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content fade-in">
      <p class="hero-sub"  data-i18n="hero_sub"></p>
      <h1 class="hero-title">GhaniWood</h1>
      <p class="hero-desc" data-i18n="hero_desc"></p>
      <div class="hero-btns">
        <a href="#services" class="btn btn-primary" data-i18n="hero_btn1"></a>
        <a href="#contact"  class="btn btn-outline" data-i18n="hero_btn2"></a>
      </div>
    </div>
    <div class="hero-scroll-hint">
      <span></span>
    </div>
  </section>

  <!-- ░░ ABOUT ░░ -->
  <section id="about" class="section about">
    <div class="container">
      <div class="about-grid">
        <div class="about-img reveal">
          <div class="img-frame">
            <img src="https://images.unsplash.com/photo-1565372195458-9de0b320ef04?w=800&q=80" alt="GhaniWood craftsman" />
            <div class="img-badge">
              <span class="badge-num">10+</span>
              <span class="badge-label" data-i18n="about_badge"></span>
            </div>
          </div>
        </div>
        <div class="about-text reveal">
          <span class="section-tag" data-i18n="about_tag"></span>
          <h2 data-i18n="about_title"></h2>
          <p data-i18n="about_p1"></p>
          <p data-i18n="about_p2"></p>
          <ul class="about-list">
            <li data-i18n="about_li1"></li>
            <li data-i18n="about_li2"></li>
            <li data-i18n="about_li3"></li>
          </ul>
          <a href="#contact" class="btn btn-primary" data-i18n="about_btn"></a>
        </div>
      </div>
    </div>
  </section>

  <!-- ░░ SERVICES ░░ -->
  <section id="services" class="section services">
    <div class="container">
      <div class="section-header reveal">
        <span class="section-tag" data-i18n="services_tag"></span>
        <h2 data-i18n="services_title"></h2>
        <p data-i18n="services_sub"></p>
      </div>
      <div class="services-grid">
        <div class="service-card reveal">
          <div class="service-icon">🪑</div>
          <h3 data-i18n="s1_title"></h3>
          <p  data-i18n="s1_desc"></p>
        </div>
        <div class="service-card reveal">
          <div class="service-icon">📦</div>
          <h3 data-i18n="s2_title"></h3>
          <p  data-i18n="s2_desc"></p>
        </div>
        <div class="service-card reveal">
          <div class="service-icon">🔨</div>
          <h3 data-i18n="s3_title"></h3>
          <p  data-i18n="s3_desc"></p>
        </div>
        <div class="service-card reveal">
          <div class="service-icon">🍳</div>
          <h3 data-i18n="s4_title"></h3>
          <p  data-i18n="s4_desc"></p>
        </div>
        <div class="service-card reveal">
          <div class="service-icon">🪟</div>
          <h3 data-i18n="s5_title"></h3>
          <p  data-i18n="s5_desc"></p>
        </div>
        <div class="service-card reveal">
          <div class="service-icon">🛠️</div>
          <h3 data-i18n="s6_title"></h3>
          <p  data-i18n="s6_desc"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- ░░ GALLERY ░░ -->
  <section id="gallery" class="section gallery">
    <div class="container">
      <div class="section-header reveal">
        <span class="section-tag" data-i18n="gallery_tag"></span>
        <h2 data-i18n="gallery_title"></h2>
        <p  data-i18n="gallery_sub"></p>
      </div>
      <div class="gallery-grid">
        <div class="gallery-item reveal" style="--delay:.0s"><img src="https://images.unsplash.com/photo-1504148455328-c376907d081c?w=800&q=80" alt="Furniture assembly" /></div>
        <div class="gallery-item reveal large" style="--delay:.1s"><img src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=1200&q=80" alt="Custom sofa" /></div>
        <div class="gallery-item reveal" style="--delay:.2s"><img src="https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=800&q=80" alt="Kitchen installation" /></div>
        <div class="gallery-item reveal" style="--delay:.3s"><img src="https://images.unsplash.com/photo-1588854337221-4cf9fa96059c?w=800&q=80" alt="Woodwork detail" /></div>
        <div class="gallery-item reveal large" style="--delay:.4s"><img src="https://images.unsplash.com/photo-1631679706909-1844bbd07221?w=1200&q=80" alt="Modern kitchen" /></div>
        <div class="gallery-item reveal" style="--delay:.5s"><img src="https://images.unsplash.com/photo-1538688423619-a81d3f23454b?w=800&q=80" alt="Carpentry tools" /></div>
      </div>
      <p class="gallery-note reveal" data-i18n="gallery_note"></p>
    </div>
  </section>

  <!-- ░░ CONTACT ░░ -->
  <section id="contact" class="section contact">
    <div class="container">
      <div class="section-header reveal">
        <span class="section-tag" data-i18n="contact_tag"></span>
        <h2 data-i18n="contact_title"></h2>
        <p  data-i18n="contact_sub"></p>
      </div>
      <div class="contact-grid">
        <div class="contact-info reveal">
          <div class="contact-item">
            <span class="contact-icon">📍</span>
            <div>
              <strong data-i18n="contact_location_label"></strong>
              <span>Deutschland</span>
            </div>
          </div>
          <div class="contact-item">
            <span class="contact-icon">📞</span>
            <div>
              <strong data-i18n="contact_phone_label"></strong>
              <a href="tel:+90530458938363">+90 530 458 938 363</a>
            </div>
          </div>
          <div class="contact-item">
            <span class="contact-icon">✉️</span>
            <div>
              <strong>E-Mail</strong>
              <a href="mailto:info@ghaniwood.de">info@ghaniwood.de</a>
            </div>
          </div>
          <a href="https://wa.me/90530458938363" class="btn btn-whatsapp" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            <span data-i18n="contact_whatsapp"></span>
          </a>
        </div>

        <form class="contact-form reveal" id="contactForm">
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="form_name"></label>
              <input type="text" name="name" required data-i18n-placeholder="form_name_ph" />
            </div>
            <div class="form-group">
              <label data-i18n="form_email"></label>
              <input type="email" name="email" required data-i18n-placeholder="form_email_ph" />
            </div>
          </div>
          <div class="form-group">
            <label data-i18n="form_subject"></label>
            <input type="text" name="subject" data-i18n-placeholder="form_subject_ph" />
          </div>
          <div class="form-group">
            <label data-i18n="form_message"></label>
            <textarea name="message" rows="5" required data-i18n-placeholder="form_message_ph"></textarea>
          </div>
          <button type="submit" class="btn btn-primary" data-i18n="form_send"></button>
          <p class="form-success" id="formSuccess" data-i18n="form_success"></p>
        </form>
      </div>
    </div>
  </section>

  <!-- ░░ FOOTER ░░ -->
  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-logo">
        <span class="logo-icon">🪵</span>
        <span class="logo-text">GhaniWood</span>
      </div>
      <p class="footer-copy">© 2025 GhaniWood. <span data-i18n="footer_rights"></span></p>
      <p class="footer-tagline" data-i18n="footer_tagline"></p>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
